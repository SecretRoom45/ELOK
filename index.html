<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ELOK · Conciergerie Airbnb premium à Gien</title>
  <meta name="description" content="ELOK, conciergerie Airbnb digitale & locale à Gien. Gestion courte durée premium dans un rayon de 20 km : rentabilité, réactivité, sérénité." />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/Photos/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/Photos/favicon-16.png">

  <!-- Fonts (premium: editorial + clean) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* =============================
       ELOK · Premium minimal style
       ============================= */
    :root{
      --green:#1F3D2B;
      --green-2:#6E8F7A;
      --cream:#F6F4EF;
      --ink:#111111;
      --muted: rgba(17,17,17,.72);
      --line: rgba(17,17,17,.12);
      --glass: rgba(246,244,239,.74);
      --shadow: 0 28px 70px rgba(0,0,0,.18);
      --shadow-soft: 0 18px 55px rgba(0,0,0,.12);
      --radius: 18px;
      --radius-2: 26px;
      --max: 1160px;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html{ scroll-behavior:smooth; }
    body{
      background: var(--cream);
      color: var(--ink);
      font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      letter-spacing: .1px;
      line-height: 1.45;
      overflow-x:hidden;
      /* ↑ Mobile base font size augmentée */
      font-size: 16px;
    }
    a{ color: inherit; text-decoration:none; }
    img{ max-width:100%; display:block; }
    .wrap{ width:min(var(--max), calc(100% - 48px)); margin:0 auto; }

    /* ===== Mobile-first topbar layout ===== */
    .topbar{
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 10px 0;
      background: rgba(246,244,239,.86);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(17,17,17,.08);
      transition: transform .35s ease, background .35s ease;
    }
    .topbar.hidden{ transform: translateY(-110%); }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 0;
    }
    .brand-logo{
      width: 26px;
      height: 26px;
      border-radius: 50%;
      object-fit: cover;
      flex: 0 0 auto;
    }
    .brand .tag{ display:none; }

    .navlinks{ display:none; }

    .navcta{ display:flex; align-items:center; gap:10px; }
    .navcta .desktop-only{ display:none; }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(31,61,43,.18);
      font-weight: 600;
      font-size: 14px;
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease, color .25s ease, border-color .25s ease;
      user-select:none;
      cursor:pointer;
      white-space:nowrap;
    }
    /* ↑ Boutons : taille police mobile augmentée */
    @media (max-width: 860px){
      .btn{ font-size: 15px; padding: 13px 20px; }
    }

    .btn.primary{
      background: var(--green);
      color: #fff;
      border-color: rgba(31,61,43,.55);
      box-shadow: 0 18px 45px rgba(31,61,43,.22);
    }
    .btn.primary:hover{
      background: #183222;
      transform: translateY(-1px);
      box-shadow: 0 22px 55px rgba(31,61,43,.26);
    }
    .btn.ghost{
      background: transparent;
      color: var(--green);
    }
    .btn.ghost:hover{
      background: rgba(31,61,43,.08);
      transform: translateY(-1px);
    }
    .btn.small{ padding: 10px 14px; font-size: 13px; }

    .burger{
      width: 42px; height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(17,17,17,.12);
      background: rgba(246,244,239,.92);
      display:flex; align-items:center; justify-content:center;
      box-shadow: 0 10px 22px rgba(0,0,0,.08);
      cursor:pointer;
      transition: transform .25s ease, background .25s ease;
    }
    .burger:hover{ transform: translateY(-1px); background:#fff; }
    .burger span{
      width: 18px; height: 2px; background: rgba(17,17,17,.76);
      position:relative; display:block; border-radius: 2px;
    }
    .burger span:before, .burger span:after{
      content:""; position:absolute; left:0; width:18px; height:2px;
      background: rgba(17,17,17,.76); border-radius:2px;
    }
    .burger span:before{ top:-6px; }
    .burger span:after{ top:6px; }

    .drawer{
      position: fixed;
      left: 12px;
      right: 12px;
      top: 64px;
      background: rgba(246,244,239,.96);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(17,17,17,.10);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      padding: 12px;
      z-index: 60;
      display:none;
      transform-origin: top right;
      animation: pop .22s ease forwards;
    }
    @keyframes pop{ from{ transform: scale(.98); opacity:0; } to{ transform: scale(1); opacity:1; } }

    .drawer .drawer-links a{
      display:block;
      padding: 13px 12px;
      border-radius: 14px;
      color: rgba(17,17,17,.88);
      font-weight: 600;
      /* ↑ Liens drawer plus grands sur mobile */
      font-size: 16px;
    }
    .drawer .drawer-links a:hover{
      background: rgba(31,61,43,.08);
      color: var(--green);
    }
    .drawer .drawer-cta{
      display:grid;
      gap: 10px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(17,17,17,.10);
    }
    .drawer .drawer-cta .btn{ width:100%; justify-content:center; }

    /* Prevent content under fixed header */
    .hero{ padding-top: 86px; }

    /* ===== Desktop layout (>= 860px) ===== */
    @media (min-width: 860px){
      .topbar{ padding: 14px 0; }

      .brand-logo{ width: 34px; height: 34px; }
      .brand .tag{
        display:inline-block;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 2.4px;
        text-transform: uppercase;
        white-space:nowrap;
      }

      .navlinks{
        display:flex;
        gap: 22px;
        align-items:center;
        font-size: 14px;
        color: rgba(17,17,17,.86);
      }
      .navlinks a{
        padding: 10px 6px;
        border-radius: 12px;
        transition: background .25s ease, color .25s ease;
      }
      .navlinks a:hover{ background: rgba(31,61,43,.08); color: var(--green); }

      .navcta .desktop-only{ display:inline-flex; }
      .burger{ display:none; }
      .drawer{ display:none !important; }

      .hero{ padding-top: 92px; }
    }

    /* ====== Hero ====== */
    .hero{
      min-height: 100vh;
      display:flex;
      align-items:stretch;
      position:relative;
      overflow:hidden;
    }
    .hero::before{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(31,61,43,.18), transparent 60%),
        radial-gradient(1000px 500px at 80% 30%, rgba(110,143,122,.18), transparent 55%),
        linear-gradient(180deg, rgba(246,244,239,1) 0%, rgba(246,244,239,.92) 35%, rgba(246,244,239,1) 100%);
      pointer-events:none;
    }
    .hero-grid{
      position:relative;
      display:grid;
      gap: 26px;
      align-items:center;
      grid-template-columns: 1.1fr .9fr;
      padding: 60px 0 54px;
    }
    @media (max-width: 980px){
      .hero-grid{ grid-template-columns: 1fr; padding: 38px 0 36px; }
    }

    .kicker{
      display:inline-flex;
      align-items:center;
      gap: 10px;
      /* ↑ Kicker mobile augmenté */
      font-size: 13px;
      letter-spacing: 2.6px;
      text-transform: uppercase;
      color: rgba(17,17,17,.70);
      margin-bottom: 14px;
    }
    @media (max-width: 860px){
      .kicker{ font-size: 12px; }
    }
    .dot{
      width: 8px; height: 8px; border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 6px rgba(31,61,43,.10);
    }

    h1{
      font-family: "Playfair Display", serif;
      font-weight: 700;
      font-size: clamp(40px, 4.4vw, 64px);
      line-height: 1.04;
      letter-spacing: .2px;
      margin-bottom: 14px;
    }
    .lead{
      color: rgba(17,17,17,.78);
      /* ↑ Lead mobile augmenté */
      font-size: clamp(17px, 1.35vw, 20px);
      max-width: 56ch;
      margin-bottom: 24px;
    }
    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap: 12px;
      align-items:center;
      margin-bottom: 18px;
    }
    .hero-meta{
      display:flex;
      flex-wrap:wrap;
      gap: 16px;
      align-items:center;
      color: rgba(17,17,17,.68);
      /* ↑ Meta mobile augmenté */
      font-size: 14px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(17,17,17,.10);
      background: rgba(255,255,255,.34);
    }
    .pill strong{ color: rgba(17,17,17,.84); }

    .hero-card{
      position:relative;
      border-radius: var(--radius-2);
      overflow:hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(17,17,17,.10);
      background: #fff;
      min-height: 440px;
    }
    .hero-card .img{
      position:absolute; inset:0;
      background:
        linear-gradient(180deg, rgba(17,17,17,.05) 0%, rgba(17,17,17,.52) 100%),
        url("./Photos/PHOTO2.jpeg") center/cover no-repeat;
      transform: scale(1.03);
    }
    .hero-card .badge{
      position:absolute; left: 18px; top: 18px;
      display:inline-flex;
      gap: 10px;
      align-items:center;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(246,244,239,.88);
      color: rgba(17,17,17,.84);
      border: 1px solid rgba(17,17,17,.10);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
    }
    .hero-card .panel{
      position:absolute; left: 16px; right: 16px; bottom: 16px;
      background: rgba(246,244,239,.90);
      border: 1px solid rgba(17,17,17,.10);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 16px 16px;
      display:flex;
      justify-content:space-between;
      gap: 14px;
      align-items:flex-end;
    }
    .hero-card .panel h3{
      font-family:"Playfair Display", serif;
      font-size: 18px;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .hero-card .panel p{
      /* ↑ Panel card mobile augmenté */
      font-size: 14px;
      color: rgba(17,17,17,.70);
      max-width: 42ch;
    }
    .hero-card .panel .mini{
      font-size: 12px;
      color: rgba(17,17,17,.62);
      text-align:right;
      white-space:nowrap;
    }

    /* ====== Sections ====== */
    .section{
      padding: 96px 0;
      border-top: 1px solid rgba(17,17,17,.08);
      position:relative;
    }
    @media (max-width: 760px){
      .section{ padding: 76px 0; }
    }
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap: 18px;
      margin-bottom: 34px;
    }
    .section-head h2{
      font-family:"Playfair Display", serif;
      font-size: clamp(30px, 2.5vw, 40px);
      line-height: 1.08;
      letter-spacing:.2px;
    }
    .section-head p{
      color: rgba(17,17,17,.72);
      max-width: 56ch;
      /* ↑ Section head p mobile augmenté */
      font-size: 16px;
    }

    .grid-3{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    @media (max-width: 980px){ .grid-3{ grid-template-columns: 1fr; } }

    .card{
      border: 1px solid rgba(17,17,17,.10);
      border-radius: var(--radius);
      background: rgba(255,255,255,.36);
      box-shadow: 0 16px 42px rgba(0,0,0,.08);
      padding: 18px 18px;
      overflow:hidden;
      position:relative;
    }
    .card:hover{ border-color: rgba(31,61,43,.22); }
    .card .icon{
      width: 44px; height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(31,61,43,.18);
      background: rgba(31,61,43,.06);
      display:flex; align-items:center; justify-content:center;
      font-size: 18px;
      margin-bottom: 12px;
    }
    .card h3{
      /* ↑ Card h3 mobile augmenté */
      font-size: 17px;
      letter-spacing: .2px;
      margin-bottom: 8px;
    }
    .card p{
      color: rgba(17,17,17,.72);
      /* ↑ Card p mobile augmenté */
      font-size: 15px;
      line-height: 1.55;
    }

    /* ====== Split ====== */
    .split{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      align-items:center;
    }
    @media (max-width: 980px){ .split{ grid-template-columns: 1fr; } }

    .media{
      border-radius: var(--radius-2);
      overflow:hidden;
      border: 1px solid rgba(17,17,17,.10);
      box-shadow: var(--shadow-soft);
      background:#fff;
      min-height: 420px;
      position:relative;
    }
    .media .bg{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(17,17,17,.10) 0%, rgba(17,17,17,.55) 100%),
        url("https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=1400&q=80")
        center/cover no-repeat;
      transform: scale(1.03);
    }
    .media .stamp{
      position:absolute; left: 16px; top: 16px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(246,244,239,.86);
      border: 1px solid rgba(17,17,17,.10);
      backdrop-filter: blur(10px);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .steps{
      display:grid;
      gap: 12px;
      margin-top: 18px;
    }
    .step{
      display:flex;
      gap: 12px;
      align-items:flex-start;
      padding: 14px 14px;
      border-radius: 16px;
      border: 1px solid rgba(17,17,17,.10);
      background: rgba(255,255,255,.38);
    }
    .step .n{
      width: 36px; height: 36px;
      border-radius: 12px;
      display:flex; align-items:center; justify-content:center;
      background: rgba(31,61,43,.10);
      border: 1px solid rgba(31,61,43,.18);
      font-weight: 800;
      color: var(--green);
      flex: 0 0 auto;
    }
    .step strong{
      display:block;
      margin-bottom: 4px;
      /* ↑ Step strong mobile augmenté */
      font-size: 16px;
    }
    .step span{
      color: rgba(17,17,17,.70);
      /* ↑ Step span mobile augmenté */
      font-size: 15px;
    }

    /* ====== Stats ====== */
    .stats{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    @media (max-width: 980px){ .stats{ grid-template-columns: 1fr 1fr; } }
    @media (max-width: 520px){ .stats{ grid-template-columns: 1fr; } }

    .stat{
      border: 1px solid rgba(17,17,17,.10);
      border-radius: var(--radius);
      background: rgba(255,255,255,.38);
      padding: 18px 18px;
      box-shadow: 0 14px 38px rgba(0,0,0,.07);
    }
    .stat .big{
      font-family:"Playfair Display", serif;
      font-size: 30px;
      letter-spacing: .2px;
      margin-bottom: 6px;
    }
    .stat .small{
      color: rgba(17,17,17,.70);
      /* ↑ Stat small mobile augmenté */
      font-size: 14px;
      line-height: 1.5;
    }

    /* ====== Testimonials ====== */
    .quotes{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 18px;
      align-items:stretch;
    }
    @media (max-width: 980px){ .quotes{ grid-template-columns: 1fr; } }
    .quote{
      border: 1px solid rgba(17,17,17,.10);
      border-radius: var(--radius-2);
      background: rgba(255,255,255,.40);
      box-shadow: 0 16px 46px rgba(0,0,0,.08);
      padding: 22px 22px;
      position:relative;
      overflow:hidden;
    }
    .quote:before{
      content:""";
      position:absolute;
      top:-22px; left: 14px;
      font-family:"Playfair Display", serif;
      font-size: 110px;
      color: rgba(31,61,43,.10);
      pointer-events:none;
    }
    .quote .text{
      /* ↑ Quote text mobile augmenté */
      font-size: 16px;
      color: rgba(17,17,17,.78);
      line-height: 1.65;
      margin-bottom: 14px;
    }
    .quote .who{
      display:flex; gap: 10px; align-items:center;
      color: rgba(17,17,17,.70);
      /* ↑ Quote who mobile augmenté */
      font-size: 14px;
    }
    .avatar{
      width: 36px; height: 36px; border-radius: 999px;
      background: linear-gradient(135deg, rgba(31,61,43,.30), rgba(110,143,122,.30));
      border: 1px solid rgba(17,17,17,.10);
    }

    /* ====== CTA band ====== */
    .cta{
      border-radius: var(--radius-2);
      padding: 28px 28px;
      background: linear-gradient(135deg, rgba(31,61,43,1), rgba
